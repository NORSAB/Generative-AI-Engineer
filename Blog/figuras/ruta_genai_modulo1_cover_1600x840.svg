<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" width="100%" height="100%">
  <style>
    :root {
      --bg-dark: #0B0F19;
      --neon-cyan: #00F2FE;
      --neon-purple: #7F00FF;
      --neon-blue: #1A80FF;
      --neon-green: #10B981;
    }
    
    .glow-cyan {
      filter: url(#glow-c);
    }
    .glow-purple {
      filter: url(#glow-p);
    }
    
    /* Partículas dispersas */
    .particle-raw {
      fill: var(--neon-purple);
      opacity: 0.25;
    }
    
    /* Partículas estructuradas */
    .particle-aligned {
      fill: var(--neon-cyan);
      opacity: 0.85;
      filter: drop-shadow(0px 0px 8px var(--neon-cyan));
    }
    .particle-validated {
      fill: var(--neon-green);
      opacity: 0.9;
      filter: drop-shadow(0px 0px 10px var(--neon-green));
    }
    
    /* Líneas de flujo de información */
    .flow-line {
      fill: none;
      stroke-width: 1.5;
      opacity: 0.2;
    }
    .flow-line-bright {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      opacity: 0.75;
    }
  </style>

  <defs>
    <!-- Filtros de brillo de neón -->
    <filter id="glow-c" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-p" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradientes de flujo -->
    <linearGradient id="grad-cyan-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--neon-purple)"/>
      <stop offset="50%" stop-color="var(--neon-blue)"/>
      <stop offset="100%" stop-color="var(--neon-cyan)"/>
    </linearGradient>
    
    <linearGradient id="grad-cyan-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--neon-cyan)"/>
      <stop offset="100%" stop-color="var(--neon-green)"/>
    </linearGradient>

    <!-- Rejilla técnica de fondo -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1E293B" stroke-width="0.8" opacity="0.5" />
    </pattern>

    <radialGradient id="bg-radial" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#111726" />
      <stop offset="70%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#070A10" />
    </radialGradient>
  </defs>

  <!-- Lienzo y Rejilla -->
  <rect width="1600" height="840" fill="url(#bg-radial)" />
  <rect width="1600" height="840" fill="url(#grid)" />

  <!-- FLUJO VECTORIAL DE INFORMACIÓN (De Izquierda a Derecha) -->

  <!-- Líneas de trayectoria (Canales por donde fluyen las partículas) -->
  <g stroke="url(#grad-cyan-blue)">
    <path d="M 100 220 L 700 220 Q 800 220 900 320 T 1500 320" class="flow-line" />
    <path d="M 100 320 L 600 320 Q 700 420 800 420 T 1500 420" class="flow-line" />
    <path d="M 100 420 L 700 420 Q 800 420 900 520 T 1500 520" class="flow-line" />
    <path d="M 100 520 L 600 520 Q 700 420 800 420 T 1500 420" class="flow-line" />
    <path d="M 100 620 L 700 620 Q 800 620 900 520 T 1500 520" class="flow-line" />
  </g>

  <!-- Líneas de flujo activas de alta intensidad -->
  <path d="M 400 320 Q 550 320 650 420 T 1150 420" class="flow-line-bright" stroke="url(#grad-cyan-blue)" />
  <path d="M 300 520 Q 450 520 550 420 T 1250 420" class="flow-line-bright" stroke="url(#grad-cyan-blue)" />
  <path d="M 600 420 Q 750 420 850 520 T 1350 520" class="flow-line-bright" stroke="url(#grad-cyan-green)" />

  <!-- LADO IZQUIERDO: Caos y datos no estructurados (Partículas dispersas en el espacio) -->
  <g>
    <!-- Partículas violetas dispersas -->
    <circle cx="150" cy="250" r="16" class="particle-raw" />
    <circle cx="190" cy="480" r="24" class="particle-raw" />
    <circle cx="220" cy="320" r="12" class="particle-raw" />
    <circle cx="280" cy="580" r="20" class="particle-raw" />
    <circle cx="320" cy="220" r="14" class="particle-raw" />
    <circle cx="350" cy="400" r="28" class="particle-raw" />
    <circle cx="420" cy="620" r="18" class="particle-raw" />
    <circle cx="460" cy="300" r="16" class="particle-raw" />
  </g>

  <!-- CENTRO: Las Barras de Alineamiento del Prompt (Filtros de difracción de información) -->
  <g class="glow-cyan">
    <!-- Columna de Filtro 1 (System Rules) -->
    <rect x="650" y="180" width="8" height="480" fill="var(--neon-blue)" opacity="0.3" rx="4" />
    <rect x="648" y="280" width="12" height="120" fill="var(--neon-cyan)" opacity="0.8" rx="6" />
    <rect x="648" y="460" width="12" height="140" fill="var(--neon-cyan)" opacity="0.8" rx="6" />

    <!-- Columna de Filtro 2 (Few-Shot Patterning) -->
    <rect x="800" y="180" width="8" height="480" fill="var(--neon-blue)" opacity="0.3" rx="4" />
    <rect x="798" y="320" width="12" height="200" fill="var(--neon-cyan)" opacity="0.9" rx="6" />
  </g>
  
  <g class="glow-purple">
    <!-- Nodos centrales de control (Alineadores de tokens) -->
    <circle cx="654" cy="340" r="12" fill="var(--neon-purple)" />
    <circle cx="654" cy="530" r="12" fill="var(--neon-purple)" />
    <circle cx="804" cy="420" r="12" fill="var(--neon-purple)" />
  </g>

  <!-- LADO DERECHO: Estructuración y tokens alineados en fase de salida -->
  <g>
    <!-- Tokens alineados (Cyan) que fluyen por la ventana de contexto -->
    <rect x="920" y="308" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 932, 320)" />
    <rect x="1040" y="308" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 1052, 320)" />
    
    <rect x="980" y="408" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 992, 420)" />
    <rect x="1100" y="408" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 1112, 420)" />
    <rect x="1220" y="408" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 1232, 420)" />

    <!-- Tokens validados finales (Verdes) saliendo de la tubería -->
    <rect x="1340" y="408" width="24" height="24" class="particle-validated" rx="3" transform="rotate(45, 1352, 420)" />
    <rect x="1460" y="408" width="24" height="24" class="particle-validated" rx="3" transform="rotate(45, 1472, 420)" />

    <rect x="1160" y="508" width="24" height="24" class="particle-aligned" rx="3" transform="rotate(45, 1172, 520)" />
    <rect x="1280" y="508" width="24" height="24" class="particle-validated" rx="3" transform="rotate(45, 1292, 520)" />
    <rect x="1400" y="508" width="24" height="24" class="particle-validated" rx="3" transform="rotate(45, 1412, 520)" />
  </g>

  <!-- Efectos decorativos de dispersión de luz en el extremo derecho -->
  <g opacity="0.3" class="glow-cyan">
    <circle cx="1520" cy="420" r="4" fill="var(--neon-green)" />
    <circle cx="1550" cy="380" r="2" fill="var(--neon-cyan)" />
    <circle cx="1560" cy="450" r="3" fill="var(--neon-green)" />
  </g>
</svg>
