<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Fondo Oscuro -->
  <rect width="800" height="450" fill="#0B0F19" rx="8"/>
  
  <!-- Cuadrícula de fondo sutil -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" rx="8"/>

  <!-- Título del Diagrama -->
  <text x="30" y="45" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#00C2FF">
    JERARQUÍA DE ROLES EN LA API DE COMPLEMENTOS DE CHAT (STATELESS)
  </text>
  <text x="30" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#94A3B8">
    Estructura jerárquica del historial enviado en cada llamada HTTP a Databricks Foundation Models
  </text>

  <!-- Contenedor del Payload JSON (Izquierda) -->
  <rect x="30" y="90" width="420" height="330" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
  <text x="45" y="115" font-family="monospace" font-size="12" fill="#E2E8F0" font-weight="bold">POST /endpoints/databricks-meta-llama-3-1-70b/chat</text>
  
  <!-- Bloque System -->
  <rect x="45" y="135" width="390" height="65" fill="#1E293B" stroke="#00C2FF" stroke-width="1" rx="4"/>
  <text x="60" y="155" font-family="monospace" font-size="11" fill="#00C2FF" font-weight="bold">"role": "system"</text>
  <text x="60" y="172" font-family="monospace" font-size="11" fill="#94A3B8">"content": "Eres un analista SQL. Responde solo con código..."</text>
  
  <!-- Bloque User 1 -->
  <rect x="45" y="210" width="390" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1" rx="4"/>
  <text x="60" y="228" font-family="monospace" font-size="11" fill="#10B981" font-weight="bold">"role": "user"</text>
  <text x="60" y="244" font-family="monospace" font-size="11" fill="#E2E8F0">"content": "¿Total de ventas en la región Norte?"</text>

  <!-- Bloque Assistant 1 -->
  <rect x="45" y="270" width="390" height="50" fill="#1E293B" stroke="#FF8A65" stroke-width="1" rx="4"/>
  <text x="60" y="288" font-family="monospace" font-size="11" fill="#FF8A65" font-weight="bold">"role": "assistant"</text>
  <text x="60" y="304" font-family="monospace" font-size="11" fill="#94A3B8">"content": "SELECT SUM(amount) FROM gold_sales..."</text>

  <!-- Bloque User 2 (Actual) -->
  <rect x="45" y="330" width="390" height="50" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2" rx="4"/>
  <text x="60" y="348" font-family="monospace" font-size="11" fill="#10B981" font-weight="bold">"role": "user" (Último Mensaje)</text>
  <text x="60" y="364" font-family="monospace" font-size="11" fill="#E2E8F0">"content": "¿Y agrupado por mes comercial?"</text>
  <text x="60" y="375" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8" font-style="italic">Recontextualiza sobre el historial anterior</text>

  <!-- Panel Explicativo (Derecha) -->
  <rect x="470" y="90" width="300" height="330" fill="#0F172A" stroke="#1E293B" stroke-width="1" rx="6"/>
  
  <!-- Explicación System -->
  <circle cx="495" cy="120" r="10" fill="#00C2FF"/>
  <text x="492" y="124" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0F172A">S</text>
  <text x="515" y="118" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#00C2FF">System Prompt (Directiva)</text>
  <text x="515" y="133" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Fija el comportamiento inmutable del</text>
  <text x="515" y="146" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">modelo. Evita desvíos lógicos.</text>

  <!-- Explicación Historial (Stateless) -->
  <path d="M 495 190 L 495 290" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="495" cy="215" r="10" fill="#10B981"/>
  <text x="492" y="219" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0F172A">U</text>
  <text x="515" y="212" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#10B981">Historial del Turno 1</text>
  <text x="515" y="227" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Indispensable. Si no se envía,</text>
  <text x="515" y="240" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">el modelo olvida el contexto.</text>

  <circle cx="495" cy="270" r="10" fill="#FF8A65"/>
  <text x="492" y="274" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#0F172A">A</text>
  <text x="515" y="267" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#FF8A65">Assistant (Respuestas)</text>
  <text x="515" y="282" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Utilizado en few-shot para guiar</text>
  <text x="515" y="295" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">el formato sin reentrenar.</text>

  <!-- Separador -->
  <line x1="485" y1="315" x2="755" y2="315" stroke="#1E293B" stroke-width="1"/>

  <!-- Alerta Examen -->
  <rect x="485" y="330" width="270" height="75" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-width="1" rx="4"/>
  <text x="495" y="347" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#EF4444">ADVERTENCIA DEL EXAMEN</text>
  <text x="495" y="362" font-family="'Inter', sans-serif" font-size="10" fill="#E2E8F0">Las APIs no guardan estado. Cada llamada</text>
  <text x="495" y="375" font-family="'Inter', sans-serif" font-size="10" fill="#E2E8F0">debe contener todos los mensajes acumulados.</text>
  <text x="495" y="388" font-family="'Inter', sans-serif" font-size="10" fill="#E2E8F0">Esto consume tokens de forma acumulativa.</text>
</svg>
