<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquitectura RAG (Retrieval-Augmented Generation)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    :root {
      /* Dark mode forced by default for blog embedding */
      --bg-page: #0B0F19;
      --bg-card: rgba(17, 24, 39, 0.7);
      --text-heading: #F8FAFC;
      --text-body: #94A3B8;
      --accent-primary: #A855F7;
      --accent-secondary: #06B6D4;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-radius: 12px;
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      --badge-bg: var(--accent-secondary);
      --badge-color: #0B0F19;
      --step-bg: rgba(15, 23, 42, 0.4);
      --step-hover-bg: rgba(30, 41, 59, 0.5);
      --step-hover-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
      --step-icon-bg: rgba(168, 85, 247, 0.15);
      --step-icon-color: #D8B4FE;
      --arrow-color: #475569;
      --details-bg: rgba(15, 23, 42, 0.4);
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: auto;
      background-color: #0B0F19 !important;
      transition: var(--transition);
    }

    #figura-rag {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-body);
      margin: 0;
      padding: 0;
      background-color: transparent !important;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      min-height: auto;
    }

    #figura-rag * {
      box-sizing: border-box;
    }
    #figura-rag .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 0.8rem 1rem;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
      width: 100%;
      max-width: 800px;
      backdrop-filter: blur(12px);
    }
    #figura-rag .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-bottom: 0.3rem;
    }
    #figura-rag .badge {
      display: inline-block;
      align-self: flex-start;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      background-color: var(--badge-bg);
      color: var(--badge-color);
      border-radius: 4px;
    }
    #figura-rag .card-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      color: var(--text-heading);
      font-weight: 600;
      margin: 0;
    }
    #figura-rag .card-desc {
      font-size: 0.75rem;
      color: var(--text-body);
      margin-top: 0.1rem;
      margin-bottom: 0.6rem;
      opacity: 0.85;
    }
    #figura-rag .rag-pipeline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0;
      position: relative;
    }
    /* No mobile collapse */
    #figura-rag .rag-step {
      flex: 1;
      background-color: var(--step-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.6rem 0.4rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      transition: var(--transition);
      position: relative;
    }
    #figura-rag .rag-step:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: var(--step-hover-shadow);
      background-color: var(--step-hover-bg);
    }
    #figura-rag .step-num {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background-color: var(--accent-primary);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(168, 85, 247, 0.3);
    }
    #figura-rag .step-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--step-icon-bg);
      color: var(--step-icon-color);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    #figura-rag .rag-step:hover .step-icon {
      background-color: var(--accent-primary);
      color: white;
    }
    #figura-rag .rag-step h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      color: var(--text-heading);
      font-weight: 600;
      margin: 0;
    }
    #figura-rag .rag-step p {
      display: none;
    }
    #figura-rag .rag-arrow {
      color: var(--arrow-color);
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
<div id="figura-rag">
  <div class="card glass-card">
    <div class="card-header">
      <h2>Arquitectura RAG (Retrieval-Augmented Generation)</h2>
    </div>
    <p class="card-desc">El flujo de trabajo empresarial para enriquecer los prompts del modelo con información verídica y gobernada en tu Lakehouse.</p>

    <div class="rag-pipeline">
      <!-- Step 1 -->
      <div class="rag-step" data-step="1">
        <div class="step-num">1</div>
        <div class="step-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h4>Pregunta de Usuario</h4>
      </div>

      <div class="rag-arrow">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>

      <!-- Step 2 -->
      <div class="rag-step" data-step="2">
        <div class="step-num">2</div>
        <div class="step-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <h4>Vector Search</h4>
      </div>

      <div class="rag-arrow">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>

      <!-- Step 3 -->
      <div class="rag-step" data-step="3">
        <div class="step-num">3</div>
        <div class="step-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <h4>Prompt Enriquecido</h4>
      </div>

      <div class="rag-arrow">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>

      <!-- Step 4 -->
      <div class="rag-step" data-step="4">
        <div class="step-num">4</div>
        <div class="step-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </div>
        <h4>Inferencia LLM</h4>
      </div>
    </div>
  </div>
</div>
</body>
</html>
