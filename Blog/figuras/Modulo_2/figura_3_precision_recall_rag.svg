<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1240" width="2000" height="1240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=Inter:wght@300;400;600;700&amp;display=swap');
      .main-title { font-family: 'Outfit', sans-serif; font-weight: 800; fill: #FFFFFF; font-size: 56px; }
      .section-title { font-family: 'Outfit', sans-serif; font-weight: 600; fill: #2DD4BF; font-size: 34px; }
      .text-desc { font-family: 'Inter', sans-serif; font-weight: 400; fill: #94A3B8; font-size: 26px; }
      .label-title { font-family: 'Inter', sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 24px; }
      .formula { font-family: 'Courier New', Courier, monospace; font-size: 26px; fill: #F8FAFC; font-weight: bold; }
      .score-text { font-family: 'Inter', sans-serif; font-weight: 600; fill: #2DD4BF; font-size: 20px; }
    </style>

    <!-- Gradientes de la Paleta Oficial -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A13" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <linearGradient id="coral-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Sombra -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Fondo (Sin esquinas redondeadas) -->
  <rect width="2000" height="1240" fill="url(#bg-grad)" />

  <!-- Título Superior -->
  <text x="80" y="100" class="main-title">Métricas de Recuperación: Precision, Recall y Reranking</text>
  <text x="80" y="150" class="text-desc">Evaluación del pipeline de búsqueda RAG y optimización de relevancia fina.</text>

  <!-- ================= SECCIÓN IZQUIERDA: CORPUS COMPLETO ================= -->
  <g transform="translate(70, 240)" filter="url(#shadow)">
    <rect width="520" height="920" rx="16" fill="#131B2E" stroke="#334155" stroke-width="3" />
    <text x="40" y="60" class="section-title">A. Corpus de Documentos</text>
    <text x="40" y="100" class="text-desc">Chunks totales en Delta Lake.</text>

    <!-- Chunks del Corpus -->
    <g transform="translate(40, 160)">
      <!-- Fila 1 -->
      <rect x="0" y="0" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="150" y="0" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="300" y="0" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      
      <!-- Fila 2 -->
      <rect x="0" y="100" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      <rect x="150" y="100" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="300" y="100" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />

      <!-- Fila 3 -->
      <rect x="0" y="200" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="150" y="200" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      <rect x="300" y="200" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />

      <!-- Fila 4 -->
      <rect x="0" y="300" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      <rect x="150" y="300" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="300" y="300" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      
      <!-- Fila 5 -->
      <rect x="0" y="400" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
      <rect x="150" y="400" width="120" height="70" rx="8" fill="url(#emerald-grad)" />
      <rect x="300" y="400" width="120" height="70" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />

      <!-- Leyenda Interna -->
      <g transform="translate(0, 520)">
        <rect x="0" y="0" width="44" height="44" rx="8" fill="url(#emerald-grad)" />
        <text x="64" y="32" font-family="'Inter', sans-serif" font-weight="700" fill="#FFFFFF" font-size="22px">Chunks Relevantes (6)</text>

        <rect x="0" y="64" width="44" height="44" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" />
        <text x="64" y="96" font-family="'Inter', sans-serif" fill="#94A3B8" font-size="22px">Chunks Irrelevantes (9)</text>
      </g>
    </g>
  </g>

  <!-- Flecha de Búsqueda Vectorial Centrada -->
  <g transform="translate(665, 620)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#8B5CF6" stroke-width="6" />
    <polygon points="25,-12 45,0 25,12" fill="#8B5CF6" />
    <text x="0" y="-24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" fill="#8B5CF6" font-size="20px">BUSCAR</text>
  </g>

  <!-- ================= SECCIÓN CENTRAL: VECTOR SEARCH ================= -->
  <g transform="translate(740, 240)" filter="url(#shadow)">
    <rect width="540" height="920" rx="16" fill="#131B2E" stroke="#334155" stroke-width="3" />
    <text x="40" y="60" class="section-title">B. Vector Search (Top-5)</text>
    <text x="40" y="100" class="text-desc">Recuperados por distancia coseno.</text>

    <!-- Lista de Recuperados -->
    <g transform="translate(40, 160)">
      <!-- Acierto 1 -->
      <rect width="460" height="90" rx="10" fill="url(#emerald-grad)" />
      <text x="30" y="54" class="label-title">Chunk Relevante A</text>

      <!-- Ruido 2 -->
      <rect x="0" y="110" width="460" height="90" rx="10" fill="#1E293B" stroke="#4F46E5" stroke-width="3" />
      <text x="30" y="164" font-family="'Inter', sans-serif" font-weight="600" fill="#94A3B8" font-size="24px">Chunk Irrelevante B</text>

      <!-- Acierto 3 -->
      <rect x="0" y="220" width="460" height="90" rx="10" fill="url(#emerald-grad)" />
      <text x="30" y="274" class="label-title">Chunk Relevante C</text>

      <!-- Acierto 4 -->
      <rect x="0" y="330" width="460" height="90" rx="10" fill="url(#emerald-grad)" />
      <text x="30" y="384" class="label-title">Chunk Relevante D</text>

      <!-- Ruido 5 -->
      <rect x="0" y="440" width="460" height="90" rx="10" fill="#1E293B" stroke="#4F46E5" stroke-width="3" />
      <text x="30" y="494" font-family="'Inter', sans-serif" font-weight="600" fill="#94A3B8" font-size="24px">Chunk Irrelevante E</text>
    </g>

    <!-- Métricas del Buscador Vectorial -->
    <g transform="translate(40, 720)">
      <rect width="460" height="150" rx="8" fill="#070A13" stroke="#334155" stroke-width="2" />
      <text x="30" y="50" class="formula">Precision = 3/5 = 60%</text>
      <text x="30" y="90" class="formula">Recall    = 3/6 = 50%</text>
      <text x="30" y="130" font-family="'Inter', sans-serif" fill="#94A3B8" font-size="18px">Nota: Demasiado ruido para el LLM</text>
    </g>
  </g>

  <!-- Flecha de Reranking Centrada -->
  <g transform="translate(1355, 620)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#2DD4BF" stroke-width="6" />
    <polygon points="25,-12 45,0 25,12" fill="#2DD4BF" />
    <text x="0" y="-24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="800" fill="#2DD4BF" font-size="20px">RE-RANK</text>
  </g>

  <!-- ================= SECCIÓN DERECHA: RERANKER ================= -->
  <g transform="translate(1430, 240)" filter="url(#shadow)">
    <rect width="500" height="920" rx="16" fill="#131B2E" stroke="#334155" stroke-width="3" />
    <text x="30" y="60" class="section-title">C. Reranker (Filtro Fino)</text>
    <text x="30" y="100" class="text-desc">Re-evaluado con Cross-Encoder.</text>

    <!-- Chunks re-ordenados -->
    <g transform="translate(30, 160)">
      <!-- Acierto 1 -->
      <rect width="440" height="90" rx="10" fill="url(#emerald-grad)" stroke="#FFFFFF" stroke-width="2" />
      <text x="30" y="54" class="label-title">Chunk A</text>
      <text x="410" y="54" class="score-text" text-anchor="end">Score: 0.96</text>

      <!-- Acierto 2 -->
      <rect x="0" y="110" width="440" height="90" rx="10" fill="url(#emerald-grad)" />
      <text x="30" y="164" class="label-title">Chunk C</text>
      <text x="410" y="164" class="score-text" fill="#E2E8F0" text-anchor="end">Score: 0.92</text>

      <!-- Acierto 3 -->
      <rect x="0" y="220" width="440" height="90" rx="10" fill="url(#emerald-grad)" />
      <text x="30" y="274" class="label-title">Chunk D</text>
      <text x="410" y="274" class="score-text" fill="#E2E8F0" text-anchor="end">Score: 0.89</text>

      <!-- Ruidosos filtrados y eliminados -->
      <g transform="translate(0, 330)" opacity="0.4">
        <rect width="440" height="80" rx="10" fill="#1E293B" stroke="#4F46E5" stroke-width="2" stroke-dasharray="6 6" />
        <text x="30" y="48" font-family="'Inter', sans-serif" fill="#94A3B8" font-size="22px" font-weight="600">B/E Descartados</text>
        <text x="410" y="48" class="score-text" fill="#94A3B8" text-anchor="end">Score &lt; 0.20</text>
      </g>
    </g>

    <!-- Métricas del Reranker -->
    <g transform="translate(30, 720)">
      <rect width="440" height="150" rx="8" fill="#070A13" stroke="#2DD4BF" stroke-width="2" />
      <text x="30" y="50" class="formula" fill="#2DD4BF">Precision = 3/3 = 100%</text>
      <text x="30" y="90" class="formula">Recall    = 3/6 = 50%</text>
      <text x="30" y="130" font-family="'Inter', sans-serif" fill="#2DD4BF" font-size="20px" font-weight="700">Contexto limpio de alta calidad</text>
    </g>
  </g>
</svg>
