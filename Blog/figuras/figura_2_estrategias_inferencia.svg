<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Fondo Oscuro -->
  <rect width="800" height="450" fill="#0B0F19" rx="8"/>
  <rect width="800" height="450" fill="url(#grid)" rx="8"/>

  <!-- Título -->
  <text x="30" y="45" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#00C2FF">
    ESTRATEGIAS DE INFERENCIA EN PRODUCCIÓN
  </text>
  <text x="30" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#94A3B8">
    Comparativa estructural y de consumo de tokens entre Zero-Shot, Few-Shot y Chain-of-Thought
  </text>

  <!-- 1. Zero-Shot -->
  <rect x="30" y="95" width="230" height="320" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
  <text x="45" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#38BDF8">Zero-Shot</text>
  <text x="45" y="142" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Entrada directa sin ejemplos</text>
  
  <rect x="45" y="165" width="200" height="60" fill="#1E293B" stroke="#475569" rx="4"/>
  <text x="55" y="182" font-family="monospace" font-size="10" fill="#E2E8F0">[Instrucción Directa]</text>
  <text x="55" y="198" font-family="monospace" font-size="10" fill="#94A3B8">"Clasifica esta reseña:"</text>
  <text x="55" y="212" font-family="monospace" font-size="10" fill="#94A3B8">"El envío tardó mucho."</text>
  
  <!-- Flecha -->
  <path d="M 145 235 L 145 285" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="45" y="295" width="200" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1.5" rx="4"/>
  <text x="55" y="315" font-family="monospace" font-size="10" fill="#10B981" font-weight="bold">[Salida Directa]</text>
  <text x="55" y="330" font-family="monospace" font-size="11" fill="#E2E8F0">"Negativo"</text>
  
  <text x="45" y="375" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Rápida inferencia.</text>
  <text x="45" y="390" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Menor costo en tokens.</text>
  <text x="45" y="405" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Puede fallar en formatos.</text>

  <!-- 2. Few-Shot -->
  <rect x="285" y="95" width="230" height="320" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
  <text x="300" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#00C2FF">Few-Shot</text>
  <text x="300" y="142" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Ejemplos de guía en prompt</text>
  
  <rect x="300" y="165" width="200" height="85" fill="#1E293B" stroke="#475569" rx="4"/>
  <text x="310" y="180" font-family="monospace" font-size="9" fill="#00C2FF" font-weight="bold">[Instrucción + Ejemplos]</text>
  <text x="310" y="195" font-family="monospace" font-size="9" fill="#94A3B8">"In: Excelente -> Out: POS"</text>
  <text x="310" y="208" font-family="monospace" font-size="9" fill="#94A3B8">"In: Roto -> Out: NEG"</text>
  <text x="310" y="221" font-family="monospace" font-size="9" fill="#E2E8F0">"In: El envío tardó mucho."</text>
  
  <!-- Flecha -->
  <path d="M 400 260 L 400 285" stroke="#00C2FF" stroke-width="2"/>
  
  <rect x="300" y="295" width="200" height="50" fill="#1E293B" stroke="#10B981" stroke-width="1.5" rx="4"/>
  <text x="310" y="315" font-family="monospace" font-size="10" fill="#10B981" font-weight="bold">[Salida Estructurada]</text>
  <text x="310" y="330" font-family="monospace" font-size="11" fill="#E2E8F0">"NEG"</text>
  
  <text x="300" y="375" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Enseña estilo/estructura.</text>
  <text x="300" y="390" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Mayor consumo de tokens.</text>
  <text x="300" y="405" font-family="'Inter', sans-serif" font-size="11" fill="#FF8A65" font-weight="bold">❌ No sirve como base de datos.</text>

  <!-- 3. Chain-of-Thought -->
  <rect x="540" y="95" width="230" height="320" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
  <text x="555" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#A855F7">Chain-of-Thought</text>
  <text x="555" y="142" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Razonamiento paso a paso</text>
  
  <rect x="555" y="165" width="200" height="60" fill="#1E293B" stroke="#475569" rx="4"/>
  <text x="565" y="180" font-family="monospace" font-size="9" fill="#A855F7" font-weight="bold">[Prompt con CoT]</text>
  <text x="565" y="195" font-family="monospace" font-size="9" fill="#94A3B8">"Piensa paso a paso: ¿Si X=5,</text>
  <text x="565" y="208" font-family="monospace" font-size="9" fill="#94A3B8">y Y=X+2. Cuál es Y?"</text>
  
  <!-- Flecha -->
  <path d="M 655 235 L 655 250" stroke="#A855F7" stroke-width="2"/>
  
  <!-- Caja de tokens intermedios de razonamiento -->
  <rect x="555" y="255" width="200" height="90" fill="#A855F7" fill-opacity="0.1" stroke="#A855F7" stroke-width="1.5" rx="4"/>
  <text x="565" y="272" font-family="monospace" font-size="9" fill="#A855F7" font-weight="bold">[Memoria de Trabajo / Razonamiento]</text>
  <text x="565" y="288" font-family="monospace" font-size="9" fill="#E2E8F0">1. X es igual a 5.</text>
  <text x="565" y="300" font-family="monospace" font-size="9" fill="#E2E8F0">2. Y es X + 2, es decir, 5 + 2.</text>
  <text x="565" y="312" font-family="monospace" font-size="9" fill="#E2E8F0">3. 5 + 2 da como resultado 7.</text>
  <text x="565" y="325" font-family="monospace" font-size="9" fill="#10B981" font-weight="bold">Respuesta final: 7.</text>
  
  <text x="555" y="375" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Reduce alucinaciones.</text>
  <text x="555" y="390" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">• Ideal para lógica/matemática.</text>
  <text x="555" y="405" font-family="'Inter', sans-serif" font-size="11" fill="#FF8A65">⚠️ Inferencia más lenta.</text>

  <!-- Definición de Marcador Flecha -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
