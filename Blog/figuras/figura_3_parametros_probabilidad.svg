<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Fondo Oscuro -->
  <rect width="800" height="450" fill="#0B0F19" rx="8"/>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" rx="8"/>

  <!-- Título -->
  <text x="30" y="45" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#00C2FF">
    PARÁMETROS DE CONTROL: DISTRIBUCIÓN DE PROBABILIDAD DE TOKENS
  </text>
  <text x="30" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#94A3B8">
    Comportamiento de la Temperatura (escalado logit) y Top-p (truncamiento de núcleo) al seleccionar el siguiente token
  </text>

  <!-- Gráfico de Distribución (Izquierda) -->
  <rect x="30" y="95" width="450" height="320" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" rx="6"/>
  <text x="45" y="120" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#E2E8F0">Distribución de Probabilidad del Siguiente Token</text>
  
  <!-- Ejes del gráfico -->
  <line x1="70" y1="140" x2="70" y2="350" stroke="#475569" stroke-width="1.5"/>
  <line x1="70" y1="350" x2="430" y2="350" stroke="#475569" stroke-width="1.5"/>
  <text x="40" y="145" font-family="'Inter', sans-serif" font-size="10" fill="#94A3B8">Prob</text>
  
  <!-- Barra 1: "Databricks" (Base: 50%) -->
  <rect x="90" y="245" width="45" height="105" fill="#38BDF8" rx="2"/>
  <!-- Barra 1: T=0.1 (Se eleva al 90%) -->
  <rect x="100" y="160" width="25" height="190" fill="#00C2FF" fill-opacity="0.6" rx="2"/>
  <text x="90" y="370" font-family="monospace" font-size="10" fill="#E2E8F0">"Databricks"</text>
  
  <!-- Barra 2: "Lakehouse" (Base: 25%) -->
  <rect x="160" y="297" width="45" height="53" fill="#38BDF8" rx="2"/>
  <!-- Barra 2: T=0.1 (Se reduce al 8%) -->
  <rect x="170" y="333" width="25" height="17" fill="#00C2FF" fill-opacity="0.6" rx="2"/>
  <text x="160" y="370" font-family="monospace" font-size="10" fill="#E2E8F0">"Lakehouse"</text>
  
  <!-- Barra 3: "Delta" (Base: 15%) -->
  <rect x="230" y="318" width="45" height="32" fill="#38BDF8" rx="2"/>
  <text x="240" y="370" font-family="monospace" font-size="10" fill="#E2E8F0">"Delta"</text>

  <!-- Barra 4: "SQL" (Base: 8%) -->
  <rect x="300" y="333" width="45" height="17" fill="#38BDF8" rx="2"/>
  <text x="310" y="370" font-family="monospace" font-size="10" fill="#E2E8F0">"SQL"</text>
  
  <!-- Barra 5: "Gato" (Base: 2% - Token Incoherente) -->
  <rect x="370" y="345" width="45" height="5" fill="#EF4444" rx="2"/>
  <text x="375" y="370" font-family="monospace" font-size="10" fill="#EF4444">"Gato"</text>

  <!-- Línea de corte de Top-p = 0.85 (Afecta a Delta, SQL y Gato) -->
  <line x1="285" y1="130" x2="285" y2="350" stroke="#FF8A65" stroke-width="2" stroke-dasharray="4 4"/>
  <rect x="290" y="140" width="135" height="40" fill="#FF8A65" fill-opacity="0.1" rx="4"/>
  <text x="295" y="153" font-family="'Inter', sans-serif" font-size="9" fill="#FF8A65" font-weight="bold">CORTE TOP-P (0.85)</text>
  <text x="295" y="165" font-family="'Inter', sans-serif" font-size="8" fill="#E2E8F0">Elimina tokens fuera de la</text>
  <text x="295" y="174" font-family="'Inter', sans-serif" font-size="8" fill="#E2E8F0">probabilidad acumulada del 85%.</text>

  <!-- Panel de Leyendas y Explicaciones (Derecha) -->
  <rect x="500" y="95" width="270" height="320" fill="#0F172A" stroke="#1E293B" stroke-width="1" rx="6"/>
  
  <!-- Explicación Temperatura -->
  <text x="515" y="125" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#00C2FF">Temperatura (T)</text>
  <text x="515" y="142" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Escala los logits antes de Softmax.</text>
  
  <!-- Leyenda de colores -->
  <rect x="515" y="160" width="12" height="12" fill="#38BDF8" rx="2"/>
  <text x="535" y="170" font-family="'Inter', sans-serif" font-size="10" fill="#E2E8F0">T = 1.0 (Probabilidad Original)</text>
  
  <rect x="515" y="180" width="12" height="12" fill="#00C2FF" rx="2"/>
  <text x="535" y="190" font-family="'Inter', sans-serif" font-size="10" fill="#E2E8F0">T = 0.1 (Concentrada / Determinista)</text>

  <text x="515" y="215" font-family="'Inter', sans-serif" font-size="10" fill="#94A3B8" font-style="italic">T → 0 hace que la opción más probable</text>
  <text x="515" y="227" font-family="'Inter', sans-serif" font-size="10" fill="#94A3B8" font-style="italic">sea elegida de forma casi determinista.</text>

  <!-- Separador -->
  <line x1="515" y1="245" x2="755" y2="245" stroke="#1E293B" stroke-width="1"/>

  <!-- Explicación Top-p -->
  <text x="515" y="270" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#FF8A65">Top-p (Nucleus Sampling)</text>
  <text x="515" y="287" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Filtra dinámicamente el vocabulario.</text>
  <text x="515" y="302" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">Suma las probabilidades de mayor a menor</text>
  <text x="515" y="315" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8">y corta al alcanzar el umbral.</text>
  
  <!-- Regla de Oro del Examen -->
  <rect x="515" y="335" width="240" height="65" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1" rx="4"/>
  <text x="525" y="352" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#10B981">REGLA DE PRODUCCIÓN</text>
  <text x="525" y="367" font-family="'Inter', sans-serif" font-size="9" fill="#E2E8F0">Modifica la Temperatura o el Top-p,</text>
  <text x="525" y="380" font-family="'Inter', sans-serif" font-size="9" fill="#E2E8F0">pero NUNCA modifiques ambos a la vez.</text>
</svg>
